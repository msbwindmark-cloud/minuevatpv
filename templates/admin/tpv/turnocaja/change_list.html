{% extends "admin/change_list.html" %}

{% block content_title %}
<div style="background: #1a1a2e; color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
    <span style="font-weight: bold;">💰 Turnos de Caja</span>
    <button type="button" style="background: rgba(0,212,255,0.3); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; border: 1px solid rgba(0,212,255,0.5); cursor: pointer;" onclick="enviarCierreEmail()">📧 Enviar Ultimo Cierre por Email</button>
</div>
{{ block.super }}

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function enviarCierreEmail() {
    Swal.fire({
        title: 'Enviar Cierre de Caja',
        html: 'Se enviara el resumen del ultimo turno cerrado a tu email.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#00d4ff',
        cancelButtonColor: '#64748b',
        confirmButtonText: 'Si, enviar',
        cancelButtonText: 'Cancelar',
        background: '#1e293b',
        color: '#e2e8f0'
    }).then(function(result) {
        if (result.isConfirmed) {
            Swal.fire({
                title: 'Enviando...',
                html: 'Generando resumen de cierre',
                allowOutsideClick: false,
                background: '#1e293b',
                color: '#e2e8f0',
                didOpen: function() { Swal.showLoading(); }
            });
            window.location.href = '/admin/email/enviar-cierre/';
        }
    });
}
</script>
{% endblock %}
