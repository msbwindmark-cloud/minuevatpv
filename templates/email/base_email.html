<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:30px 0;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#1e293b;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);">
<!-- HEADER -->
<tr>
<td style="background:linear-gradient(135deg,#0ea5e9,#06b6d4);padding:30px 40px;text-align:center;">
<h1 style="margin:0;color:#fff;font-size:22px;font-weight:800;">{% block header_icon %}{% endblock %} {% block header_title %}Sistema TPV Cafeteria{% endblock %}</h1>
<p style="margin:5px 0 0;color:rgba(255,255,255,0.8);font-size:13px;">{{ fecha }}</p>
</td>
</tr>
<!-- BODY -->
<tr>
<td style="padding:35px 40px;">
{% block content %}{% endblock %}
</td>
</tr>
<!-- FOOTER -->
<tr>
<td style="background:rgba(0,0,0,0.2);padding:20px 40px;text-align:center;">
<p style="margin:0;color:#64748b;font-size:11px;">{{ sistema }} &mdash; Email automatico, no responder</p>
</td>
</tr>
</table>
</td></tr>
</table>
</body>
</html>
