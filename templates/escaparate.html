<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Escaparate - 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #scene-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        .overlay { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 10; }
        .titulo-escaparate { font-size: 2.5rem; color: #f43f5e; font-weight: 900; text-shadow: 0 0 30px rgba(244,63,94,0.6); letter-spacing: 4px; }
        .subtitulo { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 8px; letter-spacing: 8px; text-transform: uppercase; }
        .productos-lista { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; padding: 0 20px; }
        .producto-card-3d {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(244,63,94,0.2);
            border-radius: 16px;
            padding: 16px 24px;
            color: #fff;
            backdrop-filter: blur(10px);
            animation: floatCard 3s ease-in-out infinite;
            min-width: 150px;
        }
        .producto-card-3d:nth-child(odd) { animation-delay: -1.5s; }
        .producto-card-3d .nombre { font-weight: 700; font-size: 1.1rem; color: #f43f5e; }
        .producto-card-3d .precio { font-size: 1.5rem; font-weight: 900; margin-top: 5px; }
        .producto-card-3d .divider { width: 40px; height: 2px; background: linear-gradient(90deg, #f43f5e, transparent); margin: 8px 0; }
        @keyframes floatCard {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .hora-actual { color: rgba(255,255,255,0.3); font-size: 3rem; font-weight: 100; position: fixed; top: 30px; right: 40px; z-index: 10; }
    </style>
</head>
<body>
    <a href="/" style="position:fixed;top:20px;left:20px;z-index:9999;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:0.8rem;backdrop-filter:blur(5px)">TPV</a>
    <div id="scene-container"></div>
    <div class="hora-actual" id="hora"></div>
    <div class="overlay">
        <div class="titulo-escaparate">CAFE TPV</div>
        <div class="subtitulo">Sabor & Experiencia Digital</div>
        <div class="productos-lista" id="productos-lista"></div>
    </div>

    <script>
    // Three.js escena 3D
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    document.getElementById('scene-container').appendChild(renderer.domElement);

    // Luces
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xf43f5e, 2, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);
    const pointLight2 = new THREE.PointLight(0xff6b9d, 1.5, 80);
    pointLight2.position.set(-10, -5, 5);
    scene.add(pointLight2);

    // Torus giratorio
    const torusGeometry = new THREE.TorusKnotGeometry(3, 0.8, 100, 16);
    const torusMaterial = new THREE.MeshPhongMaterial({
        color: 0xf43f5e,
        wireframe: true,
        transparent: true,
        opacity: 0.3,
    });
    const torus = new THREE.Mesh(torusGeometry, torusMaterial);
    scene.add(torus);

    // Esferas flotantes
    const spheres = [];
    for(let i = 0; i < 20; i++){
        const geo = new THREE.SphereGeometry(0.1 + Math.random()*0.3, 16, 16);
        const mat = new THREE.MeshPhongMaterial({
            color: [0xf43f5e, 0xff6b9d, 0xffb3c6, 0xff4081][Math.floor(Math.random()*4)],
            transparent: true,
            opacity: 0.4 + Math.random()*0.4,
        });
        const sphere = new THREE.Mesh(geo, mat);
        sphere.position.set(
            (Math.random()-0.5)*20,
            (Math.random()-0.5)*15,
            (Math.random()-0.5)*10
        );
        sphere.userData = { speed: 0.002+Math.random()*0.005, offset: Math.random()*Math.PI*2 };
        scene.add(sphere);
        spheres.push(sphere);
    }

    camera.position.z = 12;

    function animate(){
        requestAnimationFrame(animate);
        torus.rotation.x += 0.003;
        torus.rotation.y += 0.005;
        pointLight.position.x = Math.sin(Date.now()*0.001)*8;
        pointLight.position.y = Math.cos(Date.now()*0.0015)*5;
        spheres.forEach(s => {
            s.position.y += Math.sin(Date.now()*s.userData.speed + s.userData.offset)*0.005;
            s.position.x += Math.cos(Date.now()*s.userData.speed + s.userData.offset)*0.003;
        });
        renderer.render(scene, camera);
    }
    animate();

    // Hora actual
    function updateHora(){
        const now = new Date();
        document.getElementById('hora').textContent = now.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
    }
    updateHora();
    setInterval(updateHora, 1000);

    // Productos
    const productos = {{ productos|safe }};
    const contenedor = document.getElementById('productos-lista');
    productos.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'producto-card-3d';
        card.style.animationDelay = (i * 0.3) + 's';
        card.innerHTML = `
            <div class="nombre">${p.nombre}</div>
            <div class="divider"></div>
            <div class="precio">$${parseFloat(p.precio).toLocaleString('es')}</div>
        `;
        contenedor.appendChild(card);
    });

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
</body>
</html>
