<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaparate 3D - Cafe TPV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#05050a;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff}
        #scene-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

        .top-bar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-start;padding:24px 40px;background:linear-gradient(180deg,rgba(5,5,10,0.95) 0%,rgba(5,5,10,0.6) 60%,transparent 100%)}
        .hora{font-size:3rem;font-weight:100;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
        .fecha{font-size:0.85rem;color:rgba(255,255,255,0.25);letter-spacing:3px;text-transform:uppercase}

        .center-content{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:15;text-align:center;width:90vw;max-width:1000px}
        .brand{font-size:clamp(3rem,7vw,5rem);font-weight:900;background:linear-gradient(135deg,#f43f5e,#ff6b9d,#ff8fab);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;line-height:1}
        .tagline{font-size:1.1rem;color:rgba(255,255,255,0.4);letter-spacing:10px;text-transform:uppercase;margin-top:10px}

        .promo-banner{margin-top:35px;padding:20px 40px;background:linear-gradient(135deg,rgba(244,63,94,0.2),rgba(168,85,247,0.12));border:1px solid rgba(244,63,94,0.4);border-radius:20px;animation:promoGlow 3s ease-in-out infinite alternate;display:inline-block}
        @keyframes promoGlow{0%{box-shadow:0 0 30px rgba(244,63,94,0.15)}100%{box-shadow:0 0 60px rgba(244,63,94,0.4)}}
        .promo-label{font-size:0.7rem;color:#f43f5e;letter-spacing:4px;text-transform:uppercase;font-weight:700}
        .promo-text{font-size:1.8rem;font-weight:900;margin-top:4px;color:#fff}
        .promo-precio{font-size:2.5rem;font-weight:900;color:#00ff88}
        .promo-precio-old{font-size:1rem;color:rgba(255,255,255,0.35);text-decoration:line-through;margin-right:10px}

        .carousel-area{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:20px 40px 30px;background:linear-gradient(0deg,rgba(5,5,10,0.95) 0%,rgba(5,5,10,0.7) 60%,transparent 100%)}
        .carousel-track{display:flex;gap:18px;padding:10px 0;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1)}
        .product-card{flex:0 0 160px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:18px 14px;text-align:center;transition:all 0.6s cubic-bezier(0.4,0,0.2,1);opacity:0.5;transform:scale(0.85)}
        .product-card.active{opacity:1;transform:scale(1.08);border-color:rgba(244,63,94,0.5);box-shadow:0 0 40px rgba(244,63,94,0.2),0 0 80px rgba(0,212,255,0.08);background:rgba(255,255,255,0.1)}
        .product-card .p-icono{font-size:2.8rem;margin-bottom:8px;filter:drop-shadow(0 0 8px rgba(255,255,255,0.3))}
        .product-card .p-nombre{font-weight:700;font-size:0.9rem;color:#f1f5f9;margin-bottom:4px}
        .product-card .p-cat{font-size:0.6rem;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
        .product-card .p-precio{font-size:1.5rem;font-weight:900;color:#00ff88}
        .product-card .p-precio::after{content:' EUR';font-size:0.65rem;font-weight:400;color:#64748b}

        .side-qr{position:fixed;top:50%;right:40px;transform:translateY(-50%);z-index:20;text-align:center;background:rgba(5,5,10,0.7);padding:16px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px)}
        .side-qr canvas,.side-qr img{border-radius:12px;background:#fff;padding:6px;display:block}
        .side-qr .qr-label{font-size:0.65rem;color:rgba(255,255,255,0.4);margin-top:10px;letter-spacing:2px;text-transform:uppercase}
        .side-qr .qr-url{font-size:0.55rem;color:rgba(255,255,255,0.2);margin-top:4px;word-break:break-all}

        .side-menu{position:fixed;top:50%;left:40px;transform:translateY(-50%);z-index:20;width:220px;background:rgba(5,5,10,0.7);padding:20px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px)}
        .side-menu .menu-title{font-size:0.7rem;color:#f43f5e;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:14px}
        .side-menu .menu-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
        .side-menu .menu-item:last-child{border-bottom:none}
        .side-menu .menu-item .mi-nombre{font-weight:600;font-size:0.9rem;color:#e2e8f0}
        .side-menu .menu-item .mi-precio{font-weight:900;font-size:1.05rem;color:#00ff88;margin-top:3px}
        .side-menu .menu-item .mi-old{font-size:0.7rem;color:rgba(255,255,255,0.3);text-decoration:line-through;margin-right:6px}

        .stats-bar{position:fixed;bottom:30px;right:40px;z-index:20;display:flex;gap:12px}
        .stat-pill{padding:8px 16px;border-radius:30px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);font-size:0.7rem;color:rgba(255,255,255,0.5)}
        .stat-pill span{color:#00d4ff;font-weight:700}

        .back-link{position:fixed;top:24px;left:40px;z-index:99;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);padding:6px 14px;border-radius:8px;text-decoration:none;font-size:0.7rem;backdrop-filter:blur(5px);transition:all 0.3s}
        .back-link:hover{background:rgba(255,255,255,0.12);color:#fff}

        .combo-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,180px);z-index:16;background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(0,212,255,0.1));border:1px solid rgba(168,85,247,0.3);border-radius:16px;padding:14px 28px;backdrop-filter:blur(10px);animation:comboFloat 4s ease-in-out infinite alternate;text-align:center}
        @keyframes comboFloat{0%{transform:translate(-50%,180px) translateY(0)}100%{transform:translate(-50%,180px) translateY(-8px)}}
        .combo-badge .cb-label{font-size:0.6rem;color:#a855f7;letter-spacing:3px;text-transform:uppercase;font-weight:700}
        .combo-badge .cb-nombre{font-size:1.1rem;font-weight:800;color:#e2e8f0;margin-top:4px}
        .combo-badge .cb-precio{font-size:1.4rem;font-weight:900;color:#00d4ff;margin-top:2px}

        .empty-side{position:fixed;top:50%;left:40px;transform:translateY(-50%);z-index:20;width:220px;background:rgba(5,5,10,0.5);padding:20px;border-radius:20px;border:1px solid rgba(255,255,255,0.05);text-align:center}
        .empty-side .es-icon{font-size:2rem;margin-bottom:8px}
        .empty-side .es-text{font-size:0.7rem;color:rgba(255,255,255,0.25);letter-spacing:1px}
    </style>
</head>
<body>
    <a href="/" class="back-link">TPV</a>
    <div id="scene-container"></div>

    <div class="top-bar">
        <div><div class="fecha" id="fecha"></div></div>
        <div class="hora" id="hora"></div>
    </div>

    <div class="center-content">
        <div class="brand">CAFE TPV</div>
        <div class="tagline">Sabor y Experiencia Digital</div>
        <div class="promo-banner" id="promo-banner" style="display:none">
            <div class="promo-label">Destacado del dia</div>
            <div class="promo-text" id="promo-text"></div>
            <div style="margin-top:6px"><span class="promo-precio-old" id="promo-old"></span><span class="promo-precio" id="promo-precio"></span></div>
        </div>
    </div>

    <div id="combo-badge-zone"></div>

    <div class="side-qr">
        <div id="qr-container"></div>
        <div class="qr-label">Escanea el menu</div>
        <div class="qr-url" id="qr-url-text"></div>
    </div>

    <div id="left-side-zone"></div>

    <div class="carousel-area">
        <div class="carousel-track" id="carousel-track"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-pill"><span id="stat-cats">0</span> categorias</div>
        <div class="stat-pill"><span id="stat-arts">0</span> productos</div>
    </div>

<script>
var productos = {{ productos|safe }};
var menuDia = {{ menu_dia_json|safe }};
var combos = {{ combos_json|safe }};
var categorias = {{ categorias_json|safe }};

var mouseX = 0, mouseY = 0;
var targetMouseX = 0, targetMouseY = 0;
document.addEventListener('mousemove', function(e){
    targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
    targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 16);

var renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05050a, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('scene-container').appendChild(renderer.domElement);

var ambientLight = new THREE.AmbientLight(0x606080, 0.6);
scene.add(ambientLight);

var pl1 = new THREE.PointLight(0xf43f5e, 3, 80);
pl1.position.set(8, 6, 8);
scene.add(pl1);
var pl2 = new THREE.PointLight(0x00d4ff, 2, 70);
pl2.position.set(-8, -4, 6);
scene.add(pl2);
var pl3 = new THREE.PointLight(0xa855f7, 1.5, 60);
pl3.position.set(0, 6, -4);
scene.add(pl3);

var torusGeo = new THREE.TorusKnotGeometry(3.2, 0.9, 150, 20);
var torusMat = new THREE.MeshPhongMaterial({color: 0xf43f5e, wireframe: true, transparent: true, opacity: 0.35});
var torus = new THREE.Mesh(torusGeo, torusMat);
scene.add(torus);

var torusGeo2 = new THREE.TorusKnotGeometry(2.4, 0.6, 100, 14);
var torusMat2 = new THREE.MeshPhongMaterial({color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.15});
var torus2 = new THREE.Mesh(torusGeo2, torusMat2);
scene.add(torus2);

var torusGeo3 = new THREE.TorusGeometry(4.5, 0.08, 12, 80);
var torusMat3 = new THREE.MeshPhongMaterial({color: 0xa855f7, wireframe: false, transparent: true, opacity: 0.12});
var torus3 = new THREE.Mesh(torusGeo3, torusMat3);
torus3.rotation.x = Math.PI / 2;
scene.add(torus3);

var particles = [];
for(var i = 0; i < 120; i++){
    var size = 0.03 + Math.random() * 0.12;
    var geo = new THREE.SphereGeometry(size, 8, 8);
    var colors = [0xf43f5e, 0xff6b9d, 0x00d4ff, 0xa855f7, 0x00ff88, 0xffffff];
    var mat = new THREE.MeshPhongMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        transparent: true,
        opacity: 0.3 + Math.random() * 0.6
    });
    var s = new THREE.Mesh(geo, mat);
    var px = (Math.random() - 0.5) * 28;
    var py = (Math.random() - 0.5) * 20;
    var pz = (Math.random() - 0.5) * 12;
    s.position.set(px, py, pz);
    s.userData = {
        speed: 0.3 + Math.random() * 1.5,
        off: Math.random() * Math.PI * 2,
        bx: px, by: py, bz: pz,
        ampX: 0.3 + Math.random() * 0.8,
        ampY: 0.5 + Math.random() * 1.2
    };
    scene.add(s);
    particles.push(s);
}

var time = 0;
function animate(){
    requestAnimationFrame(animate);
    time += 0.016;

    mouseX += (targetMouseX - mouseX) * 0.05;
    mouseY += (targetMouseY - mouseY) * 0.05;

    torus.rotation.x += 0.003 + mouseX * 0.015;
    torus.rotation.y += 0.005 + mouseY * 0.015;

    torus2.rotation.x -= 0.004;
    torus2.rotation.z += 0.003;
    torus2.rotation.y += mouseX * 0.01;

    torus3.rotation.z += 0.001;

    pl1.position.x = Math.sin(time * 0.5) * 10;
    pl1.position.y = Math.cos(time * 0.7) * 6;
    pl2.position.x = Math.cos(time * 0.4) * 9;
    pl2.position.z = 6 + Math.sin(time * 0.3) * 3;

    particles.forEach(function(p){
        p.position.y = p.userData.by + Math.sin(time * p.userData.speed + p.userData.off) * p.userData.ampY;
        p.position.x = p.userData.bx + Math.cos(time * p.userData.speed * 0.7 + p.userData.off) * p.userData.ampX;
        p.position.z = p.userData.bz + Math.sin(time * p.userData.speed * 0.4 + p.userData.off) * 0.3;
    });

    renderer.render(scene, camera);
}
animate();

function updateReloj(){
    var n = new Date();
    document.getElementById('hora').textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
    var dias = ['Domingo', 'Lunes', 'Martes', 'Miercoles', 'Jueves', 'Viernes', 'Sabado'];
    var meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    document.getElementById('fecha').textContent = dias[n.getDay()] + ' ' + n.getDate() + ' de ' + meses[n.getMonth()];
}
updateReloj();
setInterval(updateReloj, 1000);

if(menuDia.length > 0){
    var m = menuDia[0];
    document.getElementById('promo-banner').style.display = 'inline-block';
    document.getElementById('promo-text').textContent = m.nombre + ' - ' + m.articulo;
    document.getElementById('promo-old').textContent = m.precio_original.toFixed(2) + ' EUR';
    document.getElementById('promo-precio').textContent = m.precio.toFixed(2) + ' EUR';
}

var qrUrl = window.location.origin + '/';
try{
    if(typeof QRCode !== 'undefined'){
        var container = document.getElementById('qr-container');
        QRCode.toCanvas(document.createElement('canvas'), qrUrl, {
            width: 130,
            margin: 1,
            color: {dark: '#1e293b', light: '#ffffff'}
        }, function(err, canvas){
            if(!err && canvas){
                canvas.style.borderRadius = '12px';
                canvas.style.background = '#fff';
                canvas.style.padding = '6px';
                container.appendChild(canvas);
            } else {
                container.innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=' + encodeURIComponent(qrUrl) + '" width="130" style="border-radius:12px">';
            }
        });
    } else {
        document.getElementById('qr-container').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=' + encodeURIComponent(qrUrl) + '" width="130" style="border-radius:12px">';
    }
} catch(e){
    document.getElementById('qr-container').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=' + encodeURIComponent(qrUrl) + '" width="130" style="border-radius:12px">';
}
document.getElementById('qr-url-text').textContent = qrUrl;

if(menuDia.length > 0){
    var leftZone = document.getElementById('left-side-zone');
    var h = '<div class="side-menu"><div class="menu-title">Menu del dia</div>';
    menuDia.forEach(function(m){
        h += '<div class="menu-item"><div class="mi-nombre">' + m.nombre + '</div><div class="mi-precio"><span class="mi-old">' + m.precio_original.toFixed(2) + ' EUR</span> ' + m.precio.toFixed(2) + ' EUR</div></div>';
    });
    h += '</div>';
    leftZone.innerHTML = h;
} else {
    document.getElementById('left-side-zone').innerHTML = '<div class="empty-side"><div class="es-icon">Menu</div><div class="es-text">Consulta nuestras ofertas en el mostrador</div></div>';
}

if(combos.length > 0){
    var comboZone = document.getElementById('combo-badge-zone');
    var cb = combos[0];
    var comboHtml = '<div class="combo-badge"><div class="cb-label">Oferta especial</div><div class="cb-nombre">' + cb.nombre + '</div><div class="cb-precio">' + cb.precio.toFixed(2) + ' EUR</div></div>';
    comboZone.innerHTML = comboHtml;
}

document.getElementById('stat-cats').textContent = categorias.length;
document.getElementById('stat-arts').textContent = productos.length;

var carousel = document.getElementById('carousel-track');
var cardsHtml = '';
productos.forEach(function(p, i){
    cardsHtml += '<div class="product-card" id="pcard-' + i + '"><div class="p-icono">' + p.icono + '</div><div class="p-nombre">' + p.nombre + '</div><div class="p-cat">' + p.categoria + '</div><div class="p-precio">' + p.precio.toFixed(2) + '</div></div>';
});
carousel.innerHTML = cardsHtml;

var currentIdx = 0;
var totalCards = productos.length;
function rotateCarousel(){
    var cards = document.querySelectorAll('.product-card');
    cards.forEach(function(c){ c.classList.remove('active') });
    if(cards[currentIdx]) cards[currentIdx].classList.add('active');
    var cardWidth = 178;
    var offset = currentIdx * cardWidth - carousel.parentElement.offsetWidth / 2 + 80;
    carousel.style.transform = 'translateX(-' + Math.max(0, offset) + 'px)';
    currentIdx = (currentIdx + 1) % totalCards;
}
if(totalCards > 0){
    rotateCarousel();
    setInterval(rotateCarousel, 3000);
}

window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
