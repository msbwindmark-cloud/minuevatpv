<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap de Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>body { background-color: #0f172a; }</style>
</head>
<body class="text-white">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-3">
    <span class="navbar-brand fw-bold">Heatmap de Ventas</span>
    <div class="ms-auto d-flex gap-2">
        <a href="/api/dashboard-gerencia/" class="btn btn-sm btn-outline-warning rounded-3">Dashboard</a>
        <a href="/" class="btn btn-sm btn-outline-info rounded-3">TPV</a>
    </div>
</nav>
<div class="container-fluid p-4">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary">
                <div class="card-header fw-bold border-secondary">Ventas por Hora del Dia</div>
                <div class="card-body"><canvas id="chart-hora" height="300"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-dark border-secondary">
                <div class="card-header fw-bold border-secondary">Ventas por Dia de la Semana</div>
                <div class="card-body"><canvas id="chart-dia" height="300"></canvas></div>
            </div>
        </div>
        <div class="col-12">
            <div class="card bg-dark border-secondary">
                <div class="card-header fw-bold border-secondary">Mapa de Calor - Hora x Dia</div>
                <div class="card-body" id="heatmap-grid"></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
var porHora = {{ por_hora_json|safe }};
var porDia = {{ por_dia_json|safe }};

var horasRaw = porHora.map(function(h){ return new Date(h.hora).getHours(); });
var horasUnicas = [];
var ventasHoraMap = {};
var ingresosHoraMap = {};
porHora.forEach(function(h){
    var hr = new Date(h.hora).getHours();
    horasUnicas.push(hr);
    if(!ventasHoraMap[hr]) ventasHoraMap[hr] = 0;
    if(!ingresosHoraMap[hr]) ingresosHoraMap[hr] = 0;
    ventasHoraMap[hr] += h.total;
    ingresosHoraMap[hr] += parseFloat(h.ingresos || 0);
});
horasUnicas.sort(function(a,b){return a-b});
var horas = horasUnicas.map(function(h){ return h + ':00'; });
var ventasHora = horasUnicas.map(function(h){ return ventasHoraMap[h] || 0; });
var ingresosHora = horasUnicas.map(function(h){ return ingresosHoraMap[h] || 0; });

new Chart(document.getElementById('chart-hora'), {
    type: 'bar',
    data: {
        labels: horas,
        datasets: [
            { label: 'Tickets', data: ventasHora, backgroundColor: 'rgba(0,212,255,0.6)', yAxisID: 'y' },
            { label: 'Ingresos EUR', data: ingresosHora, type: 'line', borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', yAxisID: 'y1', tension: 0.3 }
        ]
    },
    options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#94a3b8' } } },
        scales: {
            x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { position: 'left', ticks: { color: '#00d4ff' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y1: { position: 'right', ticks: { color: '#00ff88' }, grid: { drawOnChartArea: false } }
        }
    }
});

var dias = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];
var ventasDia = new Array(7).fill(0);
porDia.forEach(function(d){
    ventasDia[d.dia_semana] = d.total;
});

new Chart(document.getElementById('chart-dia'), {
    type: 'bar',
    data: {
        labels: dias,
        datasets: [{ label: 'Tickets', data: ventasDia, backgroundColor: dias.map(function(_, i){ return i === 5 || i === 6 ? 'rgba(168,85,247,0.7)' : 'rgba(0,212,255,0.6)' }) }]
    },
    options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#94a3b8' } } },
        scales: {
            x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: '#00d4ff' }, grid: { color: 'rgba(255,255,255,0.05)' } }
        }
    }
});

var heatmapDiv = document.getElementById('heatmap-grid');
var matrix = {};
var maxVenta = 1;
porHora.forEach(function(h){
    var hr = new Date(h.hora).getHours();
    var dw = new Date(h.hora).getDay();
    var dwIdx = dw === 0 ? 6 : dw - 1;
    var key = hr + '-' + dwIdx;
    matrix[key] = (matrix[key] || 0) + h.total;
    if(matrix[key] > maxVenta) maxVenta = matrix[key];
});

var horasHeatmap = [];
for(var i = 7; i <= 22; i++) horasHeatmap.push(i);

var grid = '';
grid += '<div style="display:grid;grid-template-columns:60px repeat(7,1fr);gap:3px;font-size:0.75rem;">';
grid += '<div></div>';
for(var d = 0; d < 7; d++) grid += '<div style="text-align:center;color:#94a3b8;padding:6px;font-weight:700;">' + dias[d] + '</div>';
for(var hi = 0; hi < horasHeatmap.length; hi++){
    var hr = horasHeatmap[hi];
    grid += '<div style="color:#64748b;text-align:right;padding:6px;font-weight:600;">' + hr + ':00</div>';
    for(var di = 0; di < 7; di++){
        var val = matrix[hr + '-' + di] || 0;
        var intensity = maxVenta > 0 ? val / maxVenta : 0;
        var bg, fg;
        if(val === 0){ bg='rgba(255,255,255,0.03)'; fg='#475569'; }
        else if(intensity < 0.33){ bg='rgba(0,212,255,0.2)'; fg='#00d4ff'; }
        else if(intensity < 0.66){ bg='rgba(0,212,255,0.5)'; fg='#fff'; }
        else { bg='rgba(0,255,136,0.7)'; fg='#fff'; }
        grid += '<div style="background:' + bg + ';border-radius:6px;padding:8px 4px;text-align:center;color:' + fg + ';font-weight:700;">' + (val > 0 ? val : '') + '</div>';
    }
}
grid += '</div>';
heatmapDiv.innerHTML = grid;
</script>
</body>
</html>
